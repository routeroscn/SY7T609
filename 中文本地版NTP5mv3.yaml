          # - lambda: |-
              # if (id(monthly_reset_energy_switch).state) {
                # float current_energy_wh = id(id_sensor_energy_counter_persist).state;
                # id(id_energy_counter_persist) = 0.0f;  // 重置总电量
                # auto msg = esphome::str_sprintf("月自动重置, %.3f kWh", current_energy_wh / 1000.0f);
