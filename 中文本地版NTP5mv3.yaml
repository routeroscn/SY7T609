uart:
  tx_pin: 1
  rx_pin: 3
  baud_rate: 9600
  stop_bits: 1
  data_bits: 8
  parity: NONE

script:
  - id: overvoltage_recovery_script
    mode: restart  # 如果脚本正在运行时再次触发，会重新开始
    then:
      - delay: 30s
      - lambda: |-
          float v = id(id_sensor_voltage).state;
          if (v <= 250) {
            id(id_relay_master_logic).turn_on();
            id(publish_message).publish_state("过压解除");
            ESP_LOGI("RouterOS.cn", "总控继电器恢复");
          } else {
            ESP_LOGW("RouterOS.cn", "电压仍高，继续等待恢复");
            id(overvoltage_recovery_script).execute();  // 递归调用，继续等待
          }
sensor:
  - platform: sy7t609
    id: id_sensor_sy7t609
    power_factor:
      name: "26.功率因数"
      id: id_sensor_pf
      web_server:
        sorting_group_id: power_info
        # sorting_weight: 26
    voltage:
      name: "21.电压"
      id: id_sensor_voltage
      web_server:
        sorting_group_id: power_info
        # sorting_weight: 21
      on_value_range:
        - above: 250
          then:
            - lambda: |-
                if (id(enable_protection_switch).state) {
                  if (id(id_relay_master_logic).state) {
                    id(id_relay_master_logic).turn_off();
                    ESP_LOGE("RouterOS.cn", "当前电压大于 250V 自动关闭总控开关");
                    id(publish_message).publish_state("过压保护");
                    id(overvoltage_recovery_script).execute();  // 启动恢复脚本
                  }
                }
        # - below: 170
          # then:
            # - lambda: |-
                # if (id(enable_protection)) {
                  # id(id_relay_master).turn_off();
                  # ESP_LOGE("pwr_prot", "Voltage is below 170V cutting off power");
                # }
    current:
      name: "22.电流"
      id: id_sensor_current
      web_server:
        sorting_group_id: power_info
        # sorting_weight: 22
      on_value_range:
        - above: 10
          then:
            - lambda: |-
                if (id(enable_protection_switch).state) {
                  id(id_relay_master_logic).turn_off();
                  ESP_LOGE("RouterOS.cn", "当前电流大于 10A 自动关闭总控开关");
                  id(publish_message).publish_state("过流保护");
                }
    power:
      name: "24.功率"
      id: id_sensor_power
      web_server:
        sorting_group_id: power_info
        # sorting_weight: 24
    reactive_power:
      name: "25.无功功率"
      id: id_sensor_reactive_power
      unit_of_measurement: "VAR"
      web_server:
        sorting_group_id: power_info
        # sorting_weight: 25
    energy:
      name: "28.重启后电量"
      id: id_sensor_energy
      web_server:
        sorting_group_id: power_info
        # sorting_weight: 28
      #internal: true
    # frequency:
      # name: "energy_Frequency"
      # id: id_sensor_frequency
    chip_temperature:
      name: "19.芯片温度"
      id: id_sensor_chip_temperature
      web_server:
        sorting_group_id: device_info
        # sorting_weight: 16
      on_value_range:
        - above: 85
          then:
            - lambda: |-
                if (id(enable_protection_switch).state) {
                  if (id(id_relay_master_logic).state) {
                    id(id_relay_master_logic).turn_off();
                    ESP_LOGE("RouterOS.cn", "当前温度高于 85°C 自动关闭总控开关");
                    id(publish_message).publish_state("过温保护");
                  }
                }
    update_interval: 3s

  - platform: total_daily_energy
    name: "27.日电量"
    id: id_total_daily_energy_median
    power_id: id_sensor_power
    accuracy_decimals: 2
    device_class: "energy"
    state_class: "total_increasing"
    icon: "mdi:counter"
    restore: true
    unit_of_measurement: Wh
    web_server:
      sorting_group_id: power_info
      # sorting_weight: 27

  #电度量数据持久化存储到esp芯片的flash中，实现断电记忆电度量
  # 总电量持久化（断电也保留）
  - platform: copy
    name: "29.总电量"
    id: id_sensor_energy_counter_persist
    web_server:
      sorting_group_id: power_info
      # sorting_weight: 29
    source_id: id_sensor_energy
    filters:
        - lambda: |-
            static float previous_x = 0.0f;
            static bool first_run = true;
            
            if (first_run) {
                previous_x = x;
                first_run = false;
                return id(id_energy_counter_persist);
            }
            float delta = x - previous_x;
            // 只累加正增量
            if (delta > 0.0f) {
                id(id_energy_counter_persist) += delta;
            }
            previous_x = x;
            return id(id_energy_counter_persist);


#计量芯片sy7t609的电度量计数器是内存存储的，断电会丢失，因此使用esp的全局变量存储电度量
  - platform: uptime
    id: id_system_uptime
    name: "11.系统运行时间"
    entity_category: diagnostic
    # device_class: "duration"
    # state_class: "total_increasing"
    update_interval: 5s
    unit_of_measurement: s
    accuracy_decimals: 0
    icon: mdi:clock-start
    web_server:
      sorting_group_id: device_info

  - platform: wifi_signal
    name: "14.网络信号强度"
    id: id_wifi_signal
    update_interval: 10s
    entity_category: diagnostic
    web_server:
      sorting_group_id: device_info
      # sorting_weight: 14
    # internal: true

  # - platform: copy
    # source_id: wifi_signal_db
    # name: "Network WiFi Strength"
    # filters:
      # - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    # unit_of_measurement: "%"
    # entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "15.网络地址"
      entity_category: diagnostic
      # update_interval: 5min
      icon: mdi:ip-network
      web_server:
